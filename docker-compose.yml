version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nca_dc
      POSTGRES_USER: nca
      POSTGRES_PASSWORD: nca_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "cd backend && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgresql://nca:nca_dev_pass@db:5432/nca_dc
      DEBUG: "True"
      SECRET_KEY: dev-secret-key
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "cd frontend && NEXT_PUBLIC_API_URL=http://localhost:8000 npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
